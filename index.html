<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nicole Alcala</title>

    <!-- Bootstrap CDN -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
    />
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js
    "
    ></script>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>

    <!-- FAVICON -->
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />

    <!-- Custom Stylesheet -->
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="container-fluid">
      <!-- Logo and Menu BTN -->
      <header class="py-3">
        <div class="row mx-0">
          <div class="col-6 d-flex justify-content-start align-items-center ps-5">
            <img
              src="https://github.com/nicolealcala/Portfolio/blob/main/assets/logo.png?raw=true"
              alt="Nicole-logo"
              class="img-fluid logo"
            />
          </div>
          <div class="col-6 d-flex justify-content-end align-items-center pe-5">
            <input class="menu-check" id="menu-check" type="checkbox" />

            <label
              for="menu-check"
              class="menu-label d-flex justify-content-end px-4 py-2"
            >
              <div class="line1"></div>
              <div class="line2"></div>
              <div class="line3"></div>
              <label></label
            ></label>
          </div>
        </div>
      </header>

      <!-- Menu -->
      <section class="menuPage d-none">
        <div class="container">
          <div class="menuTxt">
            <span class="stroked">Home</span>
            <span class="stroked">About</span>
            <span class="stroked">Portfolio</span>
            <span class="stroked">Contact</span>
          </div>
        </div>
      </section>
      <!-- Landing Page -->
      <section class="landing">
        <div class="container">
          <div class="row mx-0">
            <div class="col-12 col-sm-6">
              <div class="left">
                <span class="sub">HELLO THERE, I AM</span>
                <p>
                  <span class="filled">Nicole</span>
                  <span class="stroked">Alcala</span>
                </p>
                <span class="txt">
                  Highly motivated and detail-oriented BSIT student. Has great
                  dedication to provide an excellent user experience. Ready to
                  contribute my knowledge and skills to a dynamic organization.
                </span>
                <div class="row mt-5">
                  <div class="col-6 col-sm-4">
                    <button type="button" class="btn primaryBtn">
                      <span class="btnTxt">Learn more</span>
                      <div id="container-stars">
                        <div id="stars"></div>
                      </div>

                      <div id="glow">
                        <div class="circle"></div>
                        <div class="circle"></div>
                      </div>
                    </button>
                  </div>
                  <div class="col-6 col-sm-8">
                    <div class="secondaryBtn-wrapper">
                      <button type="button" class="btn secondaryBtn">View CV</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="col-12 col-sm-6">
              <div class="right">

              </div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
